# Docker
# Build a Docker image
# https://docs.microsoft.com/azure/devops/pipelines/languages/docker

trigger:
- main

resources:
- repo: self

variables:
  tag: '$(Build.BuildId)'

stages:
- stage: Build
  displayName: Build image
  jobs:
  - job: Build
    displayName: Build
    pool:
      name: weatherapi agent
      
    steps:
    - task: Docker@2
      inputs:
        containerRegistry: 'Weatherapi Docker Hub'
        repository: 'vahiniponnoju/weatherapi'
        command: 'buildAndPush'
        Dockerfile: '**/Dockerfile'
        tags: |
          $(Build.BuildId)
- stage: Provision
  displayName: "Terraforming on Azure"
  dependsOn: Build
  jobs:
  - job: Provision
    displayName: "Provisioning container Instance"
    pool:
      name: weatherapi agent
    variables:
    - group: TerraformEnvVars
    steps:
    - script: |
        echo Subscription=[%ARM_SUBSCRIPTION_ID%]
        echo Tenant=[%ARM_TENANT_ID%]
        if exist .terraform rmdir /s /q .terraform
        terraform init -reconfigure ^
          -backend-config="resource_group_name=tf_rg" ^
          -backend-config="storage_account_name=tfblobstorageaccount" ^
          -backend-config="container_name=tfstate" ^
          -backend-config="key=terraform.tfstate"
        terraform validate
        terraform plan 
        terraform apply -auto-approve
      name: Runterraform  
      displayName: Run terraform
      env:
        ARM_CLIENT_ID: $(ARM_Client_ID)
        ARM_CLIENT_SECRET: $(ARM_Client_Secret)
        ARM_TENANT_ID: $(ARM_Tenant_ID)
        ARM_SUBSCRIPTION_ID: $(ARM_Subscription_ID)
